spring:
  liquibase:
    change-log: classpath:changelog.xml
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: statistics-group
    data:
      mongodb:
        host: localhost
        port: 27017
        database: statistics_db
        username: admin
        password: admin
        authentication-database: admin
  datasource:
    url: jdbc:postgresql://localhost:5555/container
    username: container
    password: container
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
      springframework:
        security: DEBUG
